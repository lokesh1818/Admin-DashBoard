<div class="container">

  <h2>User Management</h2>

  <div class="form">
    <input [(ngModel)]="newUser.name" placeholder="Name">
    <input [(ngModel)]="newUser.email" placeholder="Email">

    <select [(ngModel)]="newUser.status">
      <option value="active">Active</option>
      <option value="inactive">Inactive</option>
    </select>

    <button (click)="addUser()">Add</button>
  </div>

  <input class="search"
         [(ngModel)]="searchText"
         (input)="searchUsers()"
         placeholder="Search users...">

  <table>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Status</th>
      <th>Action</th>
    </tr>

    <tr *ngFor="let user of filteredUsers">
      <td>{{user.name}}</td>
      <td>{{user.email}}</td>
      <td>
        <span [ngClass]="user.status === 'active' ? 'status-active' : 'status-inactive'">
          {{user.status}}
        </span>
      </td>
      <td>
        <button class="delete" (click)="deleteUser(user._id)">Delete</button>
      </td>
    </tr>
  </table>

</div>
