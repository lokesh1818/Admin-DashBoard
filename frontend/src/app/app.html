<div *ngIf="isLoggedIn(); else loginPage" class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin</h2>

    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/users" routerLinkActive="active">Users</a>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div></div>

      <div class="user">
        Welcome, {{ getUserName() }} 👋
        <button (click)="logout()">Logout</button>
      </div>
    </div>

    <!-- Page Content -->
    <router-outlet></router-outlet>

  </div>
</div>

<!-- Login Page -->
<ng-template #loginPage>
  <app-login></app-login>
</ng-template>
